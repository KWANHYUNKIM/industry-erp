spring:
  application:
    name: manufacturing-erp

  datasource:
    url: jdbc:postgresql://localhost:5432/erp
    username: erp
    password: erp_dev_pw
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update          # 개발 단계: 엔티티 기준으로 테이블 자동 생성/갱신
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

server:
  port: 8081

# JWT 설정
app:
  jwt:
    # 개발용 시크릿(운영 시 환경변수로 교체). HS256 이상을 위해 최소 32바이트.
    secret: ${JWT_SECRET:change-this-in-production-please-use-a-long-random-secret-key-32bytes+}
    # 토큰 유효기간 (밀리초): 8시간
    expiration-ms: 28800000

logging:
  level:
    org.hibernate.SQL: info
