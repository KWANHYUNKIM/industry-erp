spring:
  application:
    name: manufacturing-erp

  datasource:
    url: jdbc:postgresql://localhost:5432/erp
    username: erp
    password: erp_dev_pw
    driver-class-name: org.postgresql.Driver

  # 스키마 변경은 전부 db/migration 의 V*.sql 로만 한다.
  # ddl-auto:update 는 데이터가 있는 테이블에 NOT NULL 컬럼을 추가할 때
  # WARN 만 남기고 조용히 실패하므로 더 이상 스키마 생성에 쓰지 않는다.
  flyway:
    enabled: true
    locations: classpath:db/migration
    # 이미 ddl-auto 로 만들어진 기존 DB는 V1 을 '적용됨'으로 표시만 하고 실행하지 않는다.
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: baseline from ddl-auto schema

  jpa:
    hibernate:
      ddl-auto: validate        # 엔티티와 실제 스키마가 어긋나면 기동 실패시켜 드리프트를 잡는다
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

server:
  port: 8081

# JWT 설정
app:
  jwt:
    # 개발용 시크릿(운영 시 환경변수로 교체). HS256 이상을 위해 최소 32바이트.
    secret: ${JWT_SECRET:change-this-in-production-please-use-a-long-random-secret-key-32bytes+}
    # 토큰 유효기간 (밀리초): 8시간
    expiration-ms: 28800000

logging:
  level:
    org.hibernate.SQL: info
